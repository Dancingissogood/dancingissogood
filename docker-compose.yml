services:
  postgres:
    image: postgres:17-alpine
    container_name: dancingissogood-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dancingissogood_dev}
      POSTGRES_USER: ${POSTGRES_USER:-dancingissogood}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dancingissogood_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dancingissogood_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dancingissogood_postgres_data:
